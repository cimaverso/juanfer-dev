services:

  # ================================
  # Base de datos
  # ================================
  db:
    image: postgres:16-alpine
    container_name: juanfer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ================================
  # Backend FastAPI
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: juanfer_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - proxy_net
    expose:
      - "8000"

  # ================================
  # Frontend React
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: juanfer_frontend
    restart: unless-stopped
    networks:
      - proxy_net
    expose:
      - "3000"

  # ================================
  # Nginx - Reverse Proxy (entry point)
  # ================================
  nginx:
    image: nginx:1.27-alpine
    container_name: juanfer_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - proxy_net

# ================================
# Redes separadas por seguridad
# ================================
networks:
  backend_net:       # db <-> backend (aislada del exterior)
    driver: bridge
  proxy_net:         # nginx <-> frontend <-> backend
    driver: bridge

# ================================
# Volúmenes persistentes
# ================================
volumes:
  postgres_data:
    driver: local